# Build signed Windows installers and publish a GitHub Release + latest.json updater manifest.
#
# Triggers:
#   - Push tag v* (e.g. v0.3.0) — stable production release
#   - workflow_dispatch — manual release from Actions tab
#
# Required repo secrets (run scripts/setup-github-secrets.ps1 once):
#   TAURI_SIGNING_PRIVATE_KEY
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# Repo setting: Actions → Workflow permissions → Read and write

name: Release Grokden

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Create as draft release (review before publishing)
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run test:layout

  build-release:
    name: Build & publish (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build signed installers and create release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Grokden __VERSION__
          releaseBody: |
            ## Grokden __VERSION__

            Desktop workspace for Grok CLI — Windows x64.

            ### Install

            - **Recommended:** `Grokden___VERSION___x64-setup.exe` (NSIS, supports in-app updates)
            - **Enterprise:** `Grokden___VERSION___x64_en-US.msi` (WiX)

            Install [Grok CLI](https://github.com/xai-org/grok-cli) before use.

            ### Auto-updates

            Installed NSIS builds check `latest.json` on this release. Updates are signed with the Tauri updater key.

            ### Checksums

            SHA-256 checksums are listed in the release notes generated by GitHub.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: npm run tauri